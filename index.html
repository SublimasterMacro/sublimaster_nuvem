<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sublimaster | Portal Nuvem</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons (Phosphor Icons - clean and modern) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css?v=18">
    <!-- Importando o SDK do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="bg-animated"></div>

    <!-- Tela de Login -->
    <div id="login-screen" class="screen flex-center">
        <div class="glass-panel login-box">
            <div class="logo-container">
                <i class="ph ph-cloud-arrow-up text-accent" style="font-size: 48px; margin-bottom: 10px;"></i>
                <h1 class="gradient-text">Sublimaster Nuvem</h1>
                <p class="subtitle">Portal Exclusivo do Cliente</p>
            </div>
            
            <div class="input-group">
                <i class="ph ph-key icon-input"></i>
                <input type="text" id="codigo-acesso" placeholder="Código da Confecção" autocomplete="off">
            </div>
            
            <button id="btn-login" class="btn-primary btn-lg mt-4">
                <span>Acessar Painel</span>
                <i class="ph-bold ph-arrow-right"></i>
            </button>
            <p id="login-msg" class="msg-error mt-3"></p>
        </div>
    </div>

    <!-- Dashboard (Oculto até logar) -->
    <div id="dashboard-screen" class="screen hidden">
        <header class="glass-header">
            <div class="header-content" style="flex-direction: column; align-items: stretch; gap: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <div class="brand">
                        <i class="ph-fill ph-cloud-check text-accent" style="font-size: 28px;"></i>
                        <h2 class="gradient-text">Sublimaster Nuvem</h2>
                    </div>
                    <button id="btn-logout" class="btn-outline">
                        <i class="ph ph-sign-out"></i>
                        <span>Sair</span>
                    </button>
                </div>
                <!-- Admin Tabs -->
                <div class="admin-tabs" style="display: flex; gap: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
                    <button class="tab-btn active" onclick="switchTab('tab-pedidos')" style="background: none; border: none; color: var(--text-main); font-weight: 500; cursor: pointer; padding: 8px 16px; border-bottom: 2px solid var(--accent);"><i class="ph ph-shopping-cart" style="margin-right: 8px;"></i>Meus Pedidos</button>
                    <button class="tab-btn" onclick="switchTab('tab-links')" style="background: none; border: none; color: var(--text-hint); font-weight: 500; cursor: pointer; padding: 8px 16px; border-bottom: 2px solid transparent;"><i class="ph ph-link" style="margin-right: 8px;"></i>Links para Clientes</button>
                </div>
            </div>
        </header>
        
        <main class="dashboard-container">
            <!-- ABA 1: PEDIDOS INTERNOS E HISTÓRICO -->
            <div id="tab-pedidos" class="tab-content">
            <!-- Novo Pedido -->
            <div class="glass-panel main-card slide-up">
                <div class="card-header">
                    <h3><i class="ph ph-plus-circle text-accent"></i> Criar Novo Pedido</h3>
                </div>
                
                <div class="flex-row">
                    <div class="input-group" style="flex: 1; margin: 0;">
                        <i class="ph ph-hash icon-input"></i>
                        <input type="text" id="referencia" placeholder="Ref. / Nº (Ex: PED-100)">
                    </div>
                    <div class="input-group" style="flex: 2; margin: 0;">
                        <i class="ph ph-user icon-input"></i>
                        <input type="text" id="cliente" placeholder="Nome do Cliente (Ex: Time Águia)">
                    </div>
                </div>
                
                <datalist id="tamanhos-list">
                    <option value="PP"></option><option value="P"></option><option value="M"></option><option value="G"></option><option value="GG"></option>
                    <option value="G1"></option><option value="G2"></option><option value="G3"></option><option value="G4"></option><option value="G5"></option>
                    <option value="1A"></option><option value="2A"></option><option value="4A"></option><option value="6A"></option><option value="8A"></option>
                    <option value="10A"></option><option value="12A"></option><option value="14A"></option><option value="16A"></option>
                    <option value="BLPP"></option><option value="BLP"></option><option value="BLM"></option><option value="BLG"></option><option value="BLGG"></option>
                    <option value="BLG1"></option><option value="BLG2"></option><option value="BLG3"></option><option value="BLG4"></option><option value="BLG5"></option>
                </datalist>

                <div class="table-responsive">
                    <table id="tabela-itens">
                        <thead>
                            <tr>
                                <th style="width: 35%; min-width: 180px;">Nome</th>
                                <th style="width: 12%; min-width: 80px;">Número</th>
                                <th style="width: 25%; min-width: 140px;">Adicional</th>
                                <th style="width: 18%; min-width: 100px;">Tamanho</th>
                                <th style="width: 10%; min-width: 60px;">Qtd</th>
                                <th style="width: 40px; min-width: 40px;"></th>
                            </tr>
                        </thead>
                        <tbody id="tbody-itens">
                            <!-- Itens vão brotar aqui -->
                        </tbody>
                    </table>
                </div>
                
                <div class="action-buttons">
                    <button id="btn-add-item" class="btn-secondary">
                        <i class="ph ph-list-plus"></i> Adicionar Linha
                    </button>
                    <button id="btn-clear-list" class="btn-outline">
                        <i class="ph ph-trash"></i> Limpar Lista
                    </button>
                </div>

                <div class="action-footer mt-5">
                    <p id="save-msg" class="msg-success mr-3"></p>
                    <button id="btn-salvar" class="btn-primary btn-glow">
                        <i class="ph ph-paper-plane-tilt"></i>
                        <span>Enviar para Confecção</span>
                    </button>
                </div>
            </div>
            
            <!-- Histórico -->
            <div class="glass-panel main-card history-card mt-4 slide-up" style="animation-delay: 0.1s;">
                <div class="card-header border-bottom mb-3">
                    <h3><i class="ph ph-clock-counter-clockwise text-accent"></i> Histórico Recente</h3>
                </div>
                <ul id="lista-pedidos" class="order-list">
                    <!-- Histórico via JS -->
                </ul>
            </div>
            </div> <!-- Fim tab-pedidos -->
            
            <!-- ABA 2: LINKS MÁGICOS -->
            <div id="tab-links" class="tab-content" style="display: none;">
                <!-- Gerar Link Card -->
                <div class="glass-panel main-card slide-up">
                    <div class="card-header">
                        <h3><i class="ph ph-magic-wand text-accent"></i> Gerar Link para Cliente</h3>
                        <p style="color: var(--text-hint); font-size: 0.9rem; margin-top: 8px;">Envie um link para o próprio cliente preencher os tamanhos e nomes.</p>
                    </div>
                    
                    <div class="flex-row mt-4">
                        <div class="input-group" style="flex: 2; margin: 0;">
                            <i class="ph ph-user icon-input"></i>
                            <input type="text" id="link-cliente" placeholder="Nome do Cliente ou Equipe">
                        </div>
                        <div class="input-group" style="flex: 1; margin: 0;">
                            <i class="ph ph-hourglass icon-input"></i>
                            <select id="link-validade" style="width: 100%; padding: 14px 16px 14px 48px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); border-radius: 12px; color: var(--text-main); font-family: var(--font-body); font-size: 1rem; outline: none; appearance: none; cursor: pointer; transition: all 0.3s ease;">
                                <option value="24" style="background: var(--bg-dark);">Válido por 24 horas</option>
                                <option value="48" style="background: var(--bg-dark);">Válido por 48 horas</option>
                                <option value="168" style="background: var(--bg-dark);">Válido por 7 dias</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="action-footer mt-4">
                        <p id="link-msg" class="msg-success mr-3"></p>
                        <button id="btn-gerar-link" class="btn-primary btn-glow" onclick="gerarLinkMagico()">
                            <i class="ph ph-link"></i>
                            <span>Gerar Link Único</span>
                        </button>
                    </div>
                </div>

                <!-- Lista de Links Ativos -->
                <div class="glass-panel main-card history-card mt-4 slide-up" style="animation-delay: 0.1s;">
                    <div class="card-header border-bottom mb-3">
                        <h3><i class="ph ph-list-dashes text-accent"></i> Links Ativos (Aguardando)</h3>
                    </div>
                    <ul id="lista-links" class="order-list">
                        <!-- Links via JS -->
                    </ul>
                </div>
            </div> <!-- Fim tab-links -->

        </main>
    </div>

    <script src="app.js?v=16"></script>
</body>
</html>
