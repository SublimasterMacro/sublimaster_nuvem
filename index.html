<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sublimaster | Portal Nuvem</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons (Phosphor Icons - clean and modern) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css?v=3">
    <!-- Importando o SDK do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="bg-animated"></div>

    <!-- Tela de Login -->
    <div id="login-screen" class="screen flex-center">
        <div class="glass-panel login-box">
            <div class="logo-container">
                <i class="ph ph-cloud-arrow-up text-accent" style="font-size: 48px; margin-bottom: 10px;"></i>
                <h1 class="gradient-text">Sublimaster Nuvem</h1>
                <p class="subtitle">Portal Exclusivo do Cliente</p>
            </div>
            
            <div class="input-group">
                <i class="ph ph-key icon-input"></i>
                <input type="text" id="codigo-acesso" placeholder="Código da Confecção" autocomplete="off">
            </div>
            
            <button id="btn-login" class="btn-primary btn-lg mt-4">
                <span>Acessar Painel</span>
                <i class="ph-bold ph-arrow-right"></i>
            </button>
            <p id="login-msg" class="msg-error mt-3"></p>
        </div>
    </div>

    <!-- Dashboard (Oculto até logar) -->
    <div id="dashboard-screen" class="screen hidden">
        <header class="glass-header">
            <div class="header-content">
                <div class="brand">
                    <i class="ph-fill ph-cloud-check text-accent" style="font-size: 28px;"></i>
                    <h2 class="gradient-text">Sublimaster Nuvem</h2>
                </div>
                <button id="btn-logout" class="btn-outline">
                    <i class="ph ph-sign-out"></i>
                    <span>Sair</span>
                </button>
            </div>
        </header>
        
        <main class="dashboard-container">
            <!-- Novo Pedido -->
            <div class="glass-panel main-card slide-up">
                <div class="card-header">
                    <h3><i class="ph ph-plus-circle text-accent"></i> Criar Novo Pedido</h3>
                </div>
                
                <div class="input-group mb-4 mt-2">
                <div style="display:flex; gap:10px; margin-bottom: 10px;">
                    <div class="input-group" style="flex:1; margin-bottom:0;">
                        <i class="ph ph-hash icon-input"></i>
                        <input type="text" id="referencia" placeholder="REFERÊNCIA / Nº DO PEDIDO">
                    </div>
                    <div class="input-group" style="flex:1; margin-bottom:0;">
                        <i class="ph ph-user icon-input"></i>
                        <input type="text" id="cliente" placeholder="CLIENTE DO CLIENTE">
                    </div>
                </div>
                <div class="input-group" style="margin-bottom: 15px;">
                    <i class="ph ph-text-align-left icon-input"></i>
                    <input type="text" id="observacoes" placeholder="OBSERVAÇÕES (Opcional)">
                </div>

                <datalist id="lista-tamanhos">
                    <option value="PP">
                    <option value="P">
                    <option value="M">
                    <option value="G">
                    <option value="GG">
                    <option value="EXG">
                    <option value="2A">
                    <option value="4A">
                    <option value="6A">
                    <option value="8A">
                    <option value="10A">
                    <option value="12A">
                    <option value="14A">
                </datalist>
                
                <div class="table-responsive">
                    <table id="tabela-itens">
                        <thead>
                            <tr>
                                <th>Nome <span class="opcional">(Opcional)</span></th>
                                <th>Número <span class="opcional">(Opcional)</span></th>
                                <th>Adicional <span class="opcional">(Opcional)</span></th>
                                <th>Tamanho</th>
                                <th>Qtd</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody id="tbody-itens">
                            <!-- Itens vão brotar aqui -->
                        </tbody>
                    </table>
                </div>
                
                <button id="btn-add-item" class="btn-secondary mt-3">
                    <i class="ph ph-list-plus"></i> Adicionar Linha
                </button>

                <div class="action-footer mt-5">
                    <p id="save-msg" class="msg-success mr-3"></p>
                    <button id="btn-salvar" class="btn-primary btn-glow">
                        <i class="ph ph-paper-plane-tilt"></i>
                        <span>Enviar para Confecção</span>
                    </button>
                </div>
            </div>
            
            <!-- Histórico -->
            <div class="glass-panel main-card mt-4 slide-up" style="animation-delay: 0.1s;">
                <div class="card-header border-bottom mb-3">
                    <h3><i class="ph ph-clock-counter-clockwise text-accent"></i> Histórico Recente</h3>
                </div>
                <ul id="lista-pedidos" class="order-list">
                    <!-- Histórico via JS -->
                </ul>
            </div>
        </main>
    </div>

    <!-- Modal de Status -->
    <div id="status-modal" class="modal-overlay hidden">
        <div class="modal-content glass-card">
            <h3 class="mb-3">Alterar Status</h3>
            <select id="novo-status" class="form-select mb-3" style="width:100%; padding:10px; border-radius:5px; background:#4A4A4A; color:#E0E0E0; border:1px solid #555;">
                <option value="PENDENTE">PENDENTE</option>
                <option value="EM PRODUÇÃO">EM PRODUÇÃO</option>
                <option value="AGUARDANDO APROVAÇÃO">AGUARDANDO APROVAÇÃO</option>
                <option value="CONCLUÍDO">CONCLUÍDO</option>
                <option value="ENTREGUE">ENTREGUE</option>
                <option value="CANCELADO">CANCELADO</option>
            </select>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="btn-cancel-status" class="btn-primary" style="background:#555;">Cancelar</button>
                <button id="btn-save-status" class="btn-primary">Salvar</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=4"></script>
</body>
</html>
